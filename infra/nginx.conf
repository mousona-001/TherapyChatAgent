# nginx reverse proxy — runs inside Docker (see docker-compose.yml)
# Routes a single ngrok tunnel → both local services via host.docker.internal.
#
# Routing:
#   /crisis/stream (WebSocket) → host:3002  (apps/stream)
#   /*             (HTTP)      → host:3001  (apps/api)

worker_processes 1;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;

    server {
        listen 8080;

        # ── Crisis Stream Microservice (WebSocket) ──────────────────
        location /crisis/stream {
            # host.docker.internal resolves to the Mac host machine
            proxy_pass http://host.docker.internal:3002;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            # Keep long-running crisis calls alive
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Main NestJS API (everything else) ───────────────────────
        location / {
            proxy_pass http://host.docker.internal:3001;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
